<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小岛日记 · Island Journal</title>
  <meta name="description" content="拉下手摇杆,抽取今天的日记话题。" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Schoolbell&family=Caveat:wght@400;500;600;700&family=Long+Cang&family=Nunito:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="preload" as="image" href="slot-machine-original-dynamic.png" />

  <style>
    /* Load custom font */
    @font-face {
      font-family: 'Mydogfont';
      src: url('Mydogfont-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    :root {
      --paper: #fffaf5;
      --ink: #2a1d10;
      --ink-soft: #6b513a;
      --reflect: #7a5e10;
      --check: #155544;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      color: var(--ink);
      font-family: 'Schoolbell', cursive;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    /* =============== WATERCOLOR PAPER BACKGROUND =============== */
    body {
      background-color: var(--paper);
      background-image:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.35 0 0 0 0 0.25 0 0 0 0 0.12 0 0 0 0.12 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='1200'><filter id='m'><feTurbulence type='fractalNoise' baseFrequency='0.012' numOctaves='2' seed='9'/><feColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.32 0 0 0 0 0.2 0 0 0 0.08 0'/></filter><rect width='100%25' height='100%25' filter='url(%23m)'/></svg>"),
        radial-gradient(ellipse at 50% 0%, #fffaf0 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, #f0e6d2 0%, transparent 65%);
      background-size: 320px 320px, 1200px 1200px, auto, auto;
      background-blend-mode: multiply, multiply, normal, multiply;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 16px;
    }

    /* =============== CABINET =============== */
    .cabinet {
      position: relative;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      container-type: inline-size;
    }
    .cabinet-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }
    .cabinet-img.is-hidden { visibility: hidden; }
    .cabinet-img-dynamic { z-index: 2; }

    /* Reel text overlays — sit inside the cylinder's two screens.
       Font + padding scale with the cabinet (cqi = % of container width),
       so the whole composition shrinks together on mobile. No line-clamp /
       no overflow:hidden — long questions render in full. */
    .reel-text {
      position: absolute;
      z-index: 1;
      display: grid;
      place-items: center;
      padding: clamp(2px, 1.2cqi, 8px);
      text-align: center;
      font-family: 'Schoolbell', cursive;
      font-size: clamp(10.5px, 2.4cqi, 17px);
      font-weight: 600;
      line-height: 1.35;
      color: #1f1206;
      pointer-events: none;
      word-break: break-word;
    }
    /* Tuned to match user's red-box annotations — screens positioned
       lower in the visible area of the cylinder. */
    .reel-text-left  { left: 16%; width: 24%; top: 40%; height: 32%; }
    .reel-text-right { left: 42%; width: 24%; top: 40%; height: 32%; }
    .reel-text.spinning { animation: reel-shake 0.09s linear infinite; }
    @keyframes reel-shake {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    /* Invisible click area over the lever */
    .crank-hit {
      position: absolute;
      left: 60%;
      top: 0%;
      width: 35%;
      height: 45%;
      background: transparent !important;
      border: none;
      padding: 0;
      cursor: pointer;
      z-index: 3;
      -webkit-tap-highlight-color: transparent;
    }
    .crank-hit:hover, .crank-hit:active, .crank-hit:focus {
      background: transparent !important;
      outline: none;
    }
    .crank-hit:disabled { cursor: wait; }

    /* =============== DATE DISPLAY =============== */
    .cabinet-date {
      text-align: center;
      font-family: 'Mydogfont', cursive;
      font-size: clamp(24px, 5cqi, 40px);
      font-weight: 400;
      color: var(--ink);
      margin-bottom: -28px;
      margin-top: 4px;
      letter-spacing: 2px;
    }

    /* =============== REEL LABELS UNDER MACHINE =============== */
    .reel-labels {
      display: flex;
      justify-content: center;
      gap: clamp(50px, 14vw, 130px);
      align-items: baseline;
      margin-top: -16px;
      margin-bottom: 12px;
      font-family: 'Caveat', cursive;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .reel-label-left  { color: var(--reflect); transform: rotate(-2deg); }
    .reel-label-right { color: var(--check);   transform: rotate(2deg); }

    /* =============== ANSWER AREA — handwritten ruled paper =============== */
    .answers {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .answer-block { display: flex; flex-direction: column; gap: 6px; }
    .answer-prompt {
      font-family: 'Schoolbell', cursive;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      padding: 4px 0 8px;
      letter-spacing: 0.01em;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      line-height: 1.5;
    }
    .answer-num {
      flex-shrink: 0;
      font-family: 'Mydogfont', cursive;
      font-size: 28px;
      font-weight: 400;
      line-height: 1;
      color: var(--ink-soft);
      margin-top: -2px;
    }
    .answer-block:nth-child(1) .answer-num,
    .answer-block:nth-child(2) .answer-num {
      color: #d9534f;
    }

    .answer-pad {
      position: relative;
      padding: calc(17.27% + 10px) calc(20% + 10px) calc(9.09% + 10px) calc(18.18% + 10px);
    }
    .answer-pad::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("answer%20area.png");
      background-repeat: repeat-y;
      background-size: 80% auto;
      background-position: center 0;
      background-attachment: scroll;
      pointer-events: none;
    }
    .answer-input {
      position: relative;
      width: 100%;
      height: auto;
      aspect-ratio: 8 / 7;
      min-height: 400px;
      padding: 0;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Schoolbell', cursive;
      font-size: 24px;
      font-weight: 400;
      line-height: 44px;
      color: #2a1d10;
      letter-spacing: 0.5px;
      overflow: hidden;
      box-sizing: border-box;
    }
    .answer-input::placeholder {
      color: rgba(107, 81, 58, 0.5);
      font-style: italic;
    }

    /* =============== SAVE BUTTON =============== */
    .actions {
      display: flex;
      justify-content: center;
      padding-top: 8px;
    }
    .save-btn {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 1px;
      padding: 10px 32px;
      background: #fff8e7;
      color: var(--ink);
      border: 2px solid var(--ink);
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 4px 0 0 var(--ink);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }
    .save-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 0 0 var(--ink); }
    .save-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 0 var(--ink); }

    .empty-state {
      text-align: center;
      font-family: 'Mydogfont', cursive;
      font-size: 26px;
      color: var(--ink-soft);
      padding: 36px 20px;
      opacity: 0.75;
    }
    .empty-state[hidden] { display: none; }
  </style>
</head>
<body>
  <main class="page">
    <!-- DATE ABOVE CABINET -->
    <div class="cabinet-date" id="cabDate"></div>

  <script>
    /* ================= Question pools ================= */
    const DEEP_QUESTIONS = [

      "What's something you used to want desperately that you now have?",

    ];

    const SIMPLE_QUESTIONS = [
      "How do you feel today? Name one word.",
      "What was the happiest moment today, even a tiny one?",
      "What did you eat that you actually enjoyed today?",
      "What's the weather doing where you are?",
      "What's the first thing you noticed when you woke up?",
      "Who did you talk to today?",
      "What made you laugh recently?",
      "What's one small thing that went well today?",
      "What are you looking forward to this week?",
      "Did you go outside today? How was it?",
      "What's something you're wearing today that you like?",
      "What's a sound you noticed today?",
      "What's a color you saw a lot of today?",
      "What did you drink today? Was it good?",
      "Are you tired right now? On a scale of 1–10?",
      "What's the last song you listened to?",
      "What's been on your mind in the background today?",
      "What's one thing you finished today, big or small?",
      "What did your body need today that you gave it (or didn't)?",
      "Who texted or called you today?",
      "What's the last thing that made you smile?",
      "What's one thing you saw outside today?",
      "What's something kind you did today (for yourself or someone else)?",
      "What's been frustrating today?",
      "What time did you wake up? How did you feel about it?",
      "What's one thing you're grateful for right now?",
      "What's the messiest spot in your space today?",
      "Did you move your body today? How?",
      "What's a smell you noticed today?",
      "What's a tiny win from today?",
      "What's something you wish you'd done differently today?",
      "What's a phrase you said (or heard) a lot today?",
      "What did you scroll past that stuck with you?",
      "How is your energy right now? Like a battery percentage.",
      "What's one thing you're putting off?",
      "What's a small comfort you're enjoying right now?",
      "Did you learn anything new today, even something tiny?",
      "What's the most beautiful thing you saw today?",
      "Who made today easier for you?",
      "What's something you want to remember about today?",
      "What's something you'd like to leave behind today?",
      "What did you say 'yes' to today? What did you say 'no' to?",
      "If today were a flavor, what would it taste like?",
      "What's the temperature of your mood right now?",
      "What's one thing you want to do before bed?",
      "What does the inside of your head sound like right now?",
      "What's a tiny pleasure you've had today?",
      "What's the last photo you took? Why did you take it?",
      "What's been the easiest part of today?",
      "What's been the hardest part of today?",

      "What does the rest of today look like for you?",
      "What's a sentence you'd write on a postcard about today?",

      "How does your space feel today — cozy, cluttered, calm, chaotic?",

      "Did you laugh out loud today? At what?",
      "What's the best thing you ate this week?",
      "What's a small habit you actually did today?",
      "What's something you'd like more of tomorrow?",
    ];

    /* ================= helpers ================= */
    const STORAGE_KEY = 'island-journal-';
    const pickOne = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const todayKey = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };
    const escapeHtml = (s) => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    let audioCtx;
    const initAudio = async () => {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
          await audioCtx.resume();
        }
        return audioCtx;
      } catch (e) {
        console.error('Audio init failed:', e);
      }
    };
    const tone = (freq=600, dur=0.12, vol=0.05, type='sine') => {
      try {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
      } catch (e) {}
    };
    const tick = () => tone(720, 0.025, 0.035, 'square');
    const jingle = () => [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => tone(f, 0.18, 0.05, 'sine'), i*90));
    const leverSound = () => { tone(180, 0.2, 0.08, 'sawtooth'); setTimeout(() => tone(120, 0.15, 0.06, 'sawtooth'), 80); };

    /* ================= DOM refs ================= */
    const cabinetEl   = document.getElementById('cabinet');
    const staticImg   = document.getElementById('staticImg');
    const reel1El     = document.getElementById('reel1');
    const reel2El     = document.getElementById('reel2');
    const crankBtn    = document.getElementById('crankBtn');
    const answersArea = document.getElementById('answersArea');
    const emptyState  = document.getElementById('emptyState');
    const cabDateEl   = document.getElementById('cabDate');

    // Set date above cabinet (e.g., "July 17")
    (() => {
      const d = new Date();
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      cabDateEl.textContent = `${months[d.getMonth()]} ${d.getDate()}`;
    })();

    /* ================= State ================= */
    const dayKey = todayKey();
    let prompts = null;            // [deepQ, simpleQ] | null
    let answers = ['', ''];
    let pulling = false;

    /* ===== Preload the APNG as a Blob so each click can spin a fresh
            ObjectURL — guarantees the browser decodes from frame 1 with NO
            network round-trip, no matter how many times the user clicks. ===== */
    let cachedDynamicBlob = null;
    fetch('slot-machine-original-dynamic.png')
      .then(r => r.ok ? r.blob() : null)
      .then(b => { cachedDynamicBlob = b; })
      .catch(() => {});

    /* ================= APNG replay logic =================
       The reliable way to restart an APNG: brand-new <img> element + a unique
       URL. We use an ObjectURL from the cached Blob (unique per call, zero
       network), with a cache-busted query-string fallback on cold-cache miss. */
    function mountFreshDynamic() {
      // remove any old dynamic img + revoke its url
      const old = cabinetEl.querySelector('.cabinet-img-dynamic');
      if (old) {
        if (old.dataset.objectUrl) URL.revokeObjectURL(old.dataset.objectUrl);
        old.remove();
      }

      const img = document.createElement('img');
      img.className = 'cabinet-img cabinet-img-dynamic';
      img.alt = 'lever animation';
      img.draggable = false;

      if (cachedDynamicBlob) {
        const u = URL.createObjectURL(cachedDynamicBlob);
        img.src = u;
        img.dataset.objectUrl = u;
      } else {
        img.src = 'slot-machine-original-dynamic.png?t=' + Date.now();
      }
      // insert before reel text so it sits in the right z layer
      cabinetEl.insertBefore(img, reel1El);
    }
    function removeDynamic() {
      const img = cabinetEl.querySelector('.cabinet-img-dynamic');
      if (!img) return;
      if (img.dataset.objectUrl) URL.revokeObjectURL(img.dataset.objectUrl);
      img.remove();
    }

    /* ================= Spin a single reel ================= */
    function spinReel(textEl, pool, finalText, durationMs) {
      textEl.classList.add('spinning');
      const id = setInterval(() => { textEl.textContent = pickOne(pool); tick(); }, 75);
      return new Promise(resolve => {
        setTimeout(() => {
          clearInterval(id);
          textEl.classList.remove('spinning');
          textEl.textContent = finalText;
          resolve();
        }, durationMs);
      });
    }

    /* ================= Pull handler ================= */
    async function handlePull() {
      if (pulling) return;
      pulling = true;

      // Initialize audio context early for mobile
      await initAudio();

      // 1) Hide static, mount a freshly-decoded APNG
      staticImg.classList.add('is-hidden');
      mountFreshDynamic();

      leverSound();

      // 2) Spin reels
      const deep   = pickOne(DEEP_QUESTIONS);
      const simple = pickOne(SIMPLE_QUESTIONS);
      await Promise.all([
        spinReel(reel1El, DEEP_QUESTIONS, deep, 1500),
        spinReel(reel2El, SIMPLE_QUESTIONS, simple, 2200),
      ]);

      // 3) Let the APNG settle, then swap back to static cylinder
      setTimeout(() => {
        removeDynamic();
        staticImg.classList.remove('is-hidden');
      }, 350);

      jingle();

      prompts = [deep, simple];
      renderAnswers();
      saveEntry();
      pulling = false;
    }
    crankBtn.addEventListener('click', handlePull);

    /* ================= Answer rendering / save ================= */
    let saveTimer;
    function debouncedSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveEntry, 400);
    }
    function saveEntry() {
      localStorage.setItem(STORAGE_KEY + dayKey, JSON.stringify({
        prompts, answers, savedAt: new Date().toISOString(),
      }));
    }

    function renderAnswers() {
      if (!prompts) {
        emptyState.hidden = false;
        answersArea.innerHTML = '';
        return;
      }
      emptyState.hidden = true;
      answersArea.innerHTML = prompts.map((p, i) => `
        <div class="answer-block">
          <div class="answer-prompt">
            <span class="answer-num">${i + 1}.</span>
            <span>${escapeHtml(p)}</span>
          </div>
          <div class="answer-pad">
            <textarea class="answer-input" data-idx="${i}"></textarea>
          </div>
        </div>
      `).join('') + `
        <div class="actions">
          <button class="save-btn" id="saveBtn">💾 Save</button>
        </div>
      `;
      // Hydrate textarea values + wire input listeners
      answersArea.querySelectorAll('textarea.answer-input').forEach(ta => {
        const idx = parseInt(ta.dataset.idx, 10);
        ta.value = answers[idx] || '';
        ta.addEventListener('input', () => {
          answers[idx] = ta.value;
          debouncedSave();
        });
      });
      document.getElementById('saveBtn').addEventListener('click', downloadEntry);
    }

    function downloadEntry() {
      const dateStr = new Date().toLocaleDateString(undefined, {
        weekday:'long', year:'numeric', month:'long', day:'numeric',
      });
      let body = `小岛日记 · Island Journal — ${dateStr}\n\n`;
      if (prompts) {
        prompts.forEach((p, i) => {
          body += `${i+1}. ${p}\n${answers[i] || '(empty)'}\n\n`;
        });
      } else {
        body += '(还没抽签 — 先拉一下摇杆)\n';
      }
      const blob = new Blob([body], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `island-journal-${dayKey}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    /* ================= Init: load saved entry ================= */
    (function loadSaved() {
      const raw = localStorage.getItem(STORAGE_KEY + dayKey);
      if (!raw) { renderAnswers(); return; }
      try {
        const obj = JSON.parse(raw);
        if (Array.isArray(obj.prompts) && obj.prompts.length === 2) {
          prompts = obj.prompts;
          reel1El.textContent = obj.prompts[0];
          reel2El.textContent = obj.prompts[1];
        }
        if (Array.isArray(obj.answers)) {
          answers = obj.answers.slice(0, 2);
          while (answers.length < 2) answers.push('');
        }
      } catch (e) {}
      renderAnswers();
    })();
  </script>
</body>
</html>
