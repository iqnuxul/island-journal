<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Island Journal — A Cozy Reflection Spot</title>
  <meta name="description" content="Pull the lever to draw two cozy journaling prompts. Animal Crossing inspired." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" onload="Babel.registerPreset('react-classic', { presets: [[Babel.availablePresets.react, { runtime: 'classic' }]] });"></script>

  <style>
    :root {
      --primary: #19c8b9;
      --primary-hover: #3dd4c6;
      --primary-active: #11a89b;
      --primary-bg: #e6f9f6;
      --text: #794f27;
      --text-body: #725d42;
      --text-secondary: #9f927d;
      --text-muted: #8a7b66;
      --text-disabled: #c4b89e;
      --bg: #f8f8f0;
      --bg-content: rgb(247, 243, 223);
      --bg-disabled: #f0ece2;
      --border: #c4b89e;
      --border-hover: #a89878;
      --border-strong: #9f927d;
      --success: #6fba2c;
      --success-active: #5a9e1e;
      --warning: #f5c31c;
      --warning-active: #dba90e;
      --error: #e05a5a;
      --error-active: #c94444;
      --focus-yellow: #ffcc00;
      --focus-yellow-d: #e0b800;
      --focus-yellow-radio: #f5c31c;
      --shadow-btn: #bdaea0;
      --shadow-input: #d4c9b4;
      --shadow-switch: #5a9e1e;
      --r-sm: 12px;
      --r-base: 18px;
      --r-lg: 24px;
      --r-pill: 50px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --d-fast: 0.15s;
      --d-base: 0.25s;
      --d-slow: 0.35s;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text-body);
      font-family: 'Nunito', 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
      font-weight: 500;
      letter-spacing: 0.01em;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ======= LAYOUT ======= */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    .stack-tight { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
    .stack { display: flex; flex-direction: column; gap: 16px; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .row-center { display: flex; gap: 12px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .tagline {
      color: var(--text-body);
      font-weight: 500;
      font-size: 15px;
      max-width: 480px;
      line-height: 1.55;
    }

    /* ======= TITLE (ribbon banner) ======= */
    .island-title {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 2em;
      padding: 0 1.6em;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.04em;
      filter: drop-shadow(0 0.08em 0.12em rgba(0,0,0,0.05));
    }
    .island-title-small { font-size: 14px; }
    .island-title-middle { font-size: 20px; }
    .island-title-large { font-size: 28px; }
    .island-title .ribbonText {
      position: relative;
      z-index: 4;
      font-weight: 900;
      padding-top: 0.11em;
      color: var(--rt);
    }
    .island-title .ribbonBack {
      position: absolute;
      width: 1.7em;
      height: 1.7em;
      bottom: -0.4em;
      background: var(--rb);
      z-index: 1;
    }
    .island-title .ribbonBack.left  { left: -0.85em; clip-path: polygon(100% 0%, 100% 100%, 0% 100%, 30% 50%, 0% 0%); }
    .island-title .ribbonBack.right { right: -0.85em; clip-path: polygon(0% 0%, 100% 0%, 70% 50%, 100% 100%, 0% 100%); }
    .island-title .ribbonFold {
      position: absolute;
      top: calc(100% - 0.04em);
      width: 0;
      height: 0;
      z-index: 2;
    }
    .island-title .ribbonFold.left  { left: 0; border-width: 0 0.95em 0.45em 0; border-style: solid; border-color: transparent var(--rk) transparent transparent; }
    .island-title .ribbonFold.right { right: 0; border-width: 0 0 0.45em 0.95em; border-style: solid; border-color: transparent transparent transparent var(--rk); }
    .island-title .ribbonFront {
      position: absolute;
      inset: 0 0.1em;
      border-radius: 0.2em;
      background: var(--rf);
      transform: perspective(11.5em) rotateX(3deg);
      box-shadow: inset 0 -0.06em 0 rgba(0,0,0,0.05);
      z-index: 3;
    }

    /* ======= BUTTON ======= */
    .island-btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1;
      border-width: 2px;
      border-style: solid;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform var(--d-fast) var(--ease), box-shadow var(--d-fast) var(--ease), color var(--d-fast) var(--ease), border-color var(--d-fast) var(--ease), background var(--d-fast) var(--ease);
      white-space: nowrap;
      user-select: none;
    }
    .island-btn-small  { height: 32px; padding: 0 16px; font-size: 12px; border-radius: 16px; }
    .island-btn-middle { height: 45px; padding: 0 20px; font-size: 14px; border-radius: 50px; }
    .island-btn-large  { height: 48px; padding: 0 32px; font-size: 16px; border-radius: 24px; }

    .island-btn-primary {
      color: var(--text);
      background: var(--bg);
      border-color: var(--bg);
      box-shadow: 0 5px 0 0 var(--shadow-btn);
    }
    .island-btn-primary:hover:not(:disabled) { box-shadow: 0 6px 0 0 var(--shadow-btn); transform: translateY(-1px); }
    .island-btn-primary:active:not(:disabled) { box-shadow: 0 1px 0 0 var(--shadow-btn); transform: translateY(2px); }

    .island-btn-danger {
      color: #fff;
      background: var(--error);
      border-color: var(--error);
      box-shadow: 0 5px 0 0 var(--error-active);
    }
    .island-btn-danger:hover:not(:disabled) { box-shadow: 0 6px 0 0 var(--error-active); transform: translateY(-1px); }
    .island-btn-danger:active:not(:disabled) { box-shadow: 0 1px 0 0 var(--error-active); transform: translateY(2px); }

    .island-btn-default, .island-btn-dashed {
      background: var(--bg);
      color: var(--text-body);
      border-color: var(--border-strong);
      box-shadow: 0 2px 4px 0 rgba(61,52,40,0.06);
    }
    .island-btn-dashed { border-style: dashed; }
    .island-btn-default:hover:not(:disabled), .island-btn-dashed:hover:not(:disabled) {
      color: var(--primary); border-color: var(--primary);
      box-shadow: 0 3px 10px 0 rgba(61,52,40,0.10); transform: translateY(-1px);
    }
    .island-btn-default:active:not(:disabled), .island-btn-dashed:active:not(:disabled) {
      color: var(--primary-active); border-color: var(--primary-active); transform: translateY(0);
      box-shadow: 0 2px 4px 0 rgba(61,52,40,0.06);
    }

    .island-btn-text, .island-btn-link {
      background: transparent; border-color: transparent; color: var(--text-body); box-shadow: none;
    }
    .island-btn-text:hover:not(:disabled), .island-btn-link:hover:not(:disabled) { color: var(--primary); }
    .island-btn-text:active:not(:disabled), .island-btn-link:active:not(:disabled) { color: var(--primary-active); }
    .island-btn-link { color: var(--primary); text-decoration: underline; }

    .island-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
    .island-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    .island-btn-loading {
      background-color: #0ec4b6;
      background-image: repeating-linear-gradient(-45deg, #0ec4b6 0 10px, #01b0a7 10px 20px);
      background-size: 28.28px 28.28px;
      border: 4px solid #4de2da;
      color: #fff;
      box-shadow: none;
      animation: btn-loading 1s linear infinite;
    }
    @keyframes btn-loading { to { background-position: -28.28px 0; } }

    /* ======= CARD ======= */
    .island-card {
      background: var(--bg-content);
      color: var(--text-body);
      font-weight: 500;
      padding: 16px 24px;
      border-radius: 20px;
      transition: transform var(--d-slow) var(--ease);
      box-shadow: none;
    }
    .island-card:hover { transform: translateY(-2px); }
    .island-card.no-hover:hover { transform: none; }
    .island-card-dashed {
      background: rgb(250, 248, 242);
      border: 2px dashed #e8dcc8;
    }
    .island-card-dashed:hover { border-color: #d4c4a8; transform: none; }

    /* solid colors */
    .island-card-color-default { background: rgb(247,243,223); color: #725d42; }
    .island-card-color-app-pink { background: #f8a6b2; color: #fff; }
    .island-card-color-purple { background: #b77dee; color: #fff; }
    .island-card-color-app-blue { background: #889df0; color: #fff; }
    .island-card-color-app-yellow { background: #f7cd67; color: #725d42; }
    .island-card-color-app-orange { background: #e59266; color: #fff; }
    .island-card-color-app-teal { background: #82d5bb; color: #fff; }
    .island-card-color-app-green { background: #8ac68a; color: #fff; }
    .island-card-color-app-red { background: #fc736d; color: #fff; }
    .island-card-color-lime-green { background: #d1da49; color: #3d5a1a; }
    .island-card-color-yellow-green { background: #ecdf52; color: #725d42; }
    .island-card-color-brown { background: #9a835a; color: #fff; }
    .island-card-color-warm-peach-pink { background: #e18c6f; color: #fff; }

    /* polka-dot patterns */
    .island-card-pattern-default {
      background:
        radial-gradient(circle, rgba(196, 184, 158, 0.20) 1.5px, transparent 1.5px) 0 0/28px 28px,
        radial-gradient(circle, rgba(196, 184, 158, 0.13) 1px, transparent 1px) 7px 7px/14px 14px,
        rgb(247, 243, 223);
      border: 1.5px solid #c4b89e;
      color: #725d42;
    }
    .island-card-pattern-app-pink {
      background:
        radial-gradient(circle, rgba(248, 166, 178, 0.18) 1.5px, transparent 1.5px) 0 0/28px 28px,
        radial-gradient(circle, rgba(255, 200, 210, 0.12) 1px, transparent 1px) 7px 7px/14px 14px,
        #fde4e8;
      border: 1.5px solid #f8a6b2;
      color: #a85565;
    }
    .island-card-pattern-app-teal {
      background:
        radial-gradient(circle, rgba(130, 213, 187, 0.20) 1.5px, transparent 1.5px) 0 0/28px 28px,
        radial-gradient(circle, rgba(180, 230, 210, 0.13) 1px, transparent 1px) 7px 7px/14px 14px,
        #ddf3eb;
      border: 1.5px solid #82d5bb;
      color: #1e6e58;
    }
    .island-card-pattern-app-yellow {
      background:
        radial-gradient(circle, rgba(247, 205, 103, 0.20) 1.5px, transparent 1.5px) 0 0/28px 28px,
        radial-gradient(circle, rgba(255, 220, 140, 0.13) 1px, transparent 1px) 7px 7px/14px 14px,
        #fdf2d4;
      border: 1.5px solid #f7cd67;
      color: #7a5e10;
    }
    .island-card-pattern-app-green {
      background:
        radial-gradient(circle, rgba(138, 198, 138, 0.20) 1.5px, transparent 1.5px) 0 0/28px 28px,
        radial-gradient(circle, rgba(180, 220, 180, 0.13) 1px, transparent 1px) 7px 7px/14px 14px,
        #dff0df;
      border: 1.5px solid #8ac68a;
      color: #2a6630;
    }
    .island-card-pattern-app-blue {
      background:
        radial-gradient(circle, rgba(136, 157, 240, 0.18) 1.5px, transparent 1.5px) 0 0/28px 28px,
        radial-gradient(circle, rgba(180, 200, 250, 0.12) 1px, transparent 1px) 7px 7px/14px 14px,
        #e3e7fb;
      border: 1.5px solid #889df0;
      color: #2a3d8a;
    }

    /* ======= INPUT / TEXTAREA ======= */
    .island-input, .island-textarea {
      font-family: 'Nunito', 'Noto Sans SC', sans-serif;
      background: rgb(247, 243, 223);
      color: var(--text-body);
      font-weight: 500;
      letter-spacing: 0.01em;
      border: 2px solid var(--border);
      transition: border-color var(--d-fast) var(--ease), box-shadow var(--d-fast) var(--ease);
      outline: none;
      display: block;
      width: 100%;
    }
    .island-input::placeholder, .island-textarea::placeholder {
      color: var(--border); font-weight: 400; font-style: italic;
    }
    .island-input-small { height: 32px; padding: 0 14px; font-size: 12px; border-radius: 40px; }
    .island-input-middle { height: 40px; padding: 0 18px; font-size: 14px; border-radius: 50px; }
    .island-input-large { height: 48px; padding: 0 22px; font-size: 16px; border-radius: 50px; }
    .island-input:hover, .island-textarea:hover { border-color: var(--border-hover); }
    .island-input:focus, .island-textarea:focus {
      border-color: var(--focus-yellow);
      box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.15);
    }
    .island-textarea {
      padding: 14px 18px;
      font-size: 14px;
      line-height: 1.65;
      border-radius: 22px;
      resize: vertical;
      min-height: 140px;
    }

    /* ======= TIME (HUD clock) ======= */
    .island-time {
      display: inline-flex;
      align-items: center;
      gap: 24px;
      padding: 16px 36px;
      background: linear-gradient(180deg, #fff 0%, #f8f8f0 100%);
      border: 3px solid #d4cfc3;
      border-radius: 18px;
      font-family: 'Nunito', sans-serif;
    }
    .island-time .t-date {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-right: 24px;
      border-right: 3px solid rgba(159,146,125,0.35);
    }
    .island-time .t-weekday {
      color: #6fba2c;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .island-time .t-monthday {
      color: #8b7355;
      font-weight: 800;
      font-size: 22px;
    }
    .island-time .t-clock {
      color: #8b7355;
      font-weight: 900;
      font-size: 48px;
      letter-spacing: 2px;
      font-variant-numeric: tabular-nums;
    }
    .island-time .t-colon {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ======= WALLET (currency pill) ======= */
    .island-wallet {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .island-wallet-small  { --wallet-pill-w: 96px;  --wallet-pill-h: 32px; --wallet-bag: 38px; --wallet-fz: 12px; --wallet-halo: 3px; padding-top: calc(38px * 0.7); }
    .island-wallet-medium { --wallet-pill-w: 132px; --wallet-pill-h: 42px; --wallet-bag: 50px; --wallet-fz: 17px; --wallet-halo: 4px; padding-top: calc(50px * 0.7); }
    .island-wallet-large  { --wallet-pill-w: 176px; --wallet-pill-h: 54px; --wallet-bag: 66px; --wallet-fz: 22px; --wallet-halo: 6px; padding-top: calc(66px * 0.7); }
    .island-wallet .w-pill {
      position: relative;
      width: var(--wallet-pill-w);
      height: var(--wallet-pill-h);
      border-radius: 999px;
      background: #b3a046;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 0 -6px 0 rgba(91,78,30,0.18),
        inset 0 0 0 2px rgba(91,78,30,0.12),
        0 0 0 var(--wallet-halo) #fffbe7,
        0 6px 14px rgba(91,78,30,0.18);
    }
    .island-wallet .w-bag {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: var(--wallet-bag);
      height: var(--wallet-bag);
      filter: drop-shadow(0 4px 6px rgba(91,78,30,0.18));
      z-index: 2;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(var(--wallet-bag) * 0.75);
      transition: transform 0.5s var(--ease);
    }
    .island-wallet:hover .w-bag {
      animation: walletBagBounce 0.5s var(--ease);
    }
    @keyframes walletBagBounce {
      0%   { transform: translateX(-50%) translateY(0) rotate(0); }
      35%  { transform: translateX(-50%) translateY(-8px) rotate(-6deg); }
      70%  { transform: translateX(-50%) translateY(-2px) rotate(3deg); }
      100% { transform: translateX(-50%) translateY(0) rotate(0); }
    }
    .island-wallet .w-value {
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #fff;
      padding: 0 12px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      font-size: var(--wallet-fz);
      text-shadow: 0 2px 0 rgba(91,78,30,0.55), 0 0 1px rgba(91,78,30,0.55);
    }

    /* ======= DIVIDER ======= */
    .island-divider {
      width: 100%;
      height: 12px;
      background: center/contain no-repeat;
    }
    .island-divider-dashed-brown {
      background-image: linear-gradient(to right, var(--border) 0 8px, transparent 8px 16px);
      background-size: 16px 2px;
      background-repeat: repeat-x;
      background-position: center;
    }
    .island-divider-line-brown {
      background: linear-gradient(to right, transparent 0%, var(--border) 15%, var(--border) 85%, transparent 100%);
      height: 2px;
    }

    /* ======= SLOT MACHINE SPECIFIC ======= */
    .slot-machine {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 32px 28px;
    }
    .slot-machine-header {
      display: flex;
      justify-content: center;
      margin-top: -8px;
      margin-bottom: 4px;
    }
    .reel-card {
      position: relative;
      min-height: 110px;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform var(--d-fast) var(--ease);
    }
    .reel-card.spinning { animation: reel-shake 0.1s linear infinite; }
    @keyframes reel-shake {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    .reel-tag {
      display: inline-flex;
      align-items: center;
      align-self: flex-start;
      padding: 3px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.4);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 1.5px;
      color: inherit;
      border: 1.5px solid currentColor;
    }
    .reel-text {
      font-size: 15px;
      line-height: 1.55;
      font-weight: 600;
      flex: 1;
      display: flex;
      align-items: center;
      color: inherit;
    }
    .empty-hint {
      text-align: center;
      color: var(--text-muted);
      font-style: italic;
      padding: 18px;
      background: rgb(247, 243, 223);
      border-radius: 18px;
      border: 2px dashed var(--border);
    }

    /* ======= JOURNAL ======= */
    .journal {
      width: 100%;
      max-width: 600px;
      padding: 28px 26px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .journal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .journal-date {
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 13px;
    }
    .prompt-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .prompt-line {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      background: rgb(247, 243, 223);
      border: 2px solid var(--border);
      border-radius: 18px;
      font-weight: 600;
      color: var(--text);
    }
    .prompt-num {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 13px;
    }
    .prompt-block:nth-child(2) .prompt-num { background: #f8a6b2; }
    .paper-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }
    .hint {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
    }
    .footer-note {
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
      padding-top: 12px;
    }

    /* ======= RESPONSIVE ======= */
    @media (max-width: 520px) {
      .page { padding: 24px 14px 60px; }
      .slot-machine, .journal { padding: 22px 18px; }

    function Card({ pattern, color, type, children, className = '', style, onClick }) {
      const classes = [

    function Divider({ type = 'line-brown', style }) {

    function Time({ style }) {
      const [now, setNow] = useState(() => new Date());
      const [tick, setTick] = useState(false);
      useEffect(() => {
        const id = setInterval(() => { setNow(new Date()); setTick(t => !t); }, 1000);
        return () => clearInterval(id);
      }, []);
      const weekday = now.toLocaleDateString('en-US', { weekday: 'short' });
      const month = now.toLocaleDateString('en-US', { month: 'short' });
      const day = now.getDate();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      return (
        <div className="island-time" style={style}>
          <div className="t-date">

          <div className="t-clock">
            <span>{hours}</span><span className="t-colon" style={{opacity: tick ? 1 : 0}}>:</span><span>{minutes}</span>
          </div>
        </div>
      );
    }

    function Wallet({ value, size = 'medium', icon = '🍃', thousandSeparator = ',', style }) {
      let display;
      if (value === undefined || value === null) display = '00,000';
      else if (typeof value === 'number') display = thousandSeparator ? value.toLocaleString('en-US').replaceAll(',', thousandSeparator) : String(value);
      else display = String(value);
      return (
        <div className={`island-wallet island-wallet-${size}`} style={style}>

    /* =====================================================

    const DEEP_QUESTIONS = [

    /* =====================================================
       HELPERS
       ===================================================== */

    const STORAGE = {
      journal: 'island-journal-',
      count: 'island-pull-count',
    };
    const pickOne = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const todayKey = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };

    let audioCtx;
    const tone = (freq=600, duration=0.12, volume=0.05, type='sine') => {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        g.gain.setValueAtTime(volume, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(g).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    };
    const click = () => tone(720, 0.025, 0.035, 'square');
    const jingle = () => [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => tone(f, 0.18, 0.05, 'sine'), i*90));

    /* =====================================================

    function SlotMachine({ onPulled, initialPrompts }) {
      const [reel1, setReel1] = useState(initialPrompts?.[0] || 'Pull the lever…');
      const [reel2, setReel2] = useState(initialPrompts?.[1] || '…write what comes up.');
      const [spinning1, setSpinning1] = useState(false);
      const [spinning2, setSpinning2] = useState(false);
      const [hint, setHint] = useState(initialPrompts ? 'Welcome back. Keep writing 🌱' : 'Tap the big PULL button to draw today’s prompts.');
      const [pulling, setPulling] = useState(false);
      const [pullCount, setPullCount] = useState(() => parseInt(localStorage.getItem(STORAGE.count) || '0', 10));

      const spinReel = (pool, setText, setSpin, finalText, durationMs) => {
        setSpin(true);
        const id = setInterval(() => { setText(pickOne(pool)); click(); }, 75);
        return new Promise(resolve => {
          setTimeout(() => {
            clearInterval(id);
            setSpin(false);
            setText(finalText);
            resolve();
          }, durationMs);
        });
      };

      const handlePull = async () => {
        if (pulling) return;
        setPulling(true);
        setHint('✨ Drawing your prompts…');
        const deep = pickOne(DEEP_QUESTIONS);
        const simple = pickOne(SIMPLE_QUESTIONS);
        await Promise.all([
          spinReel(DEEP_QUESTIONS, setReel1, setSpinning1, deep, 1500),
          spinReel(SIMPLE_QUESTIONS, setReel2, setSpinning2, simple, 2200),
        ]);
        jingle();
        setHint('Got it! Open your journal below to write 🌱');
        const nextCount = pullCount + 1;
        setPullCount(nextCount);
        localStorage.setItem(STORAGE.count, String(nextCount));
        onPulled([deep, simple]);
        setPulling(false);
      };

      return (
        <Card pattern="default" className="slot-machine no-hover">
          <div className="slot-machine-header">
            <Title color="app-yellow" size="small">DAILY DRAW</Title>
          </div>

          <Card color="app-teal" className={`reel-card no-hover ${spinning1 ? 'spinning' : ''}`}>

            <div className="reel-text">{reel1}</div>
          </Card>

          <Card color="app-pink" className={`reel-card no-hover ${spinning2 ? 'spinning' : ''}`}>
            <span className="reel-tag">CHECK IN</span>
            <div className="reel-text">{reel2}</div>
          </Card>

          <div className="row-center" style={{ marginTop: 8 }}>
            <Button type="primary" size="large" loading={pulling} onClick={handlePull}>
              {pulling ? 'PULLING…' : '🍃 PULL!'}
            </Button>
          </div>

          <div className="row-center" style={{ marginTop: 4, flexDirection: 'column', gap: 6 }}>
            <span className="hint">{hint}</span>
            <Wallet value={pullCount} size="small" icon="🌱" />
          </div>
        </Card>
      );
    }

    function Journal({ prompts }) {
      const dayKey = todayKey();
      const [answers, setAnswers] = useState(['', '']);
      const saveTimerRef = useRef(null);

      // Load saved on mount + whenever prompts change (e.g., after a pull)
      useEffect(() => {
        const raw = localStorage.getItem(STORAGE.journal + dayKey);
        if (raw) {
          try {
            const obj = JSON.parse(raw);
            if (Array.isArray(obj.answers)) {
              const next = obj.answers.slice(0, 2);
              while (next.length < 2) next.push('');
              setAnswers(next);
            }
          } catch (e) {}
        }
      }, [dayKey]);

      const updateAnswer = (idx, value) => {
        setAnswers(prev => {
          const next = [...prev];
          next[idx] = value;
          clearTimeout(saveTimerRef.current);
          saveTimerRef.current = setTimeout(() => {
            localStorage.setItem(STORAGE.journal + dayKey, JSON.stringify({
              answers: next, prompts, savedAt: new Date().toISOString(),
            }));
          }, 400);
          return next;
        });
      };

      const handleDownload = () => {
        const dateStr = new Date().toLocaleDateString(undefined, {
          weekday:'long', year:'numeric', month:'long', day:'numeric',
        });
        let body = `Island Journal — ${dateStr}\n\n`;
        if (prompts) {
          prompts.forEach((p, i) => {
            body += `${i+1}. ${p}\n${answers[i] || '(empty)'}\n\n`;
          });
        } else {
          body += '(no prompts yet — pull the lever first)\n';
        }
        const blob = new Blob([body], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `island-journal-${dayKey}.txt`;
        a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <Card pattern="app-yellow" className="journal no-hover">
          <div className="journal-header">
            <Title color="app-green" size="small">Today's Journal</Title>
            <Time />
          </div>
          <Divider type="dashed-brown" />
          {!prompts && (
            <div className="empty-hint">🌿 Pull the lever above to get today's prompts.</div>

          {prompts && prompts.map((p, i) => (
            <div className="prompt-block" key={i}>
              <div className="prompt-line">
                <span className="prompt-num">{i + 1}</span>
                <span>{p}</span>
              </div>
              <Textarea
                value={answers[i]}
                onChange={(e) => updateAnswer(i, e.target.value)}
                placeholder="Write your answer here…"
                rows={6}
              />
            </div>
          ))}
          <div className="row" style={{ justifyContent: 'flex-start', gap: 10 }}>
            <Button type="default" size="middle" onClick={handleDownload}>💾 Save as .txt</Button>
          </div>
          <p className="paper-note">Auto-saves to this browser. Won't disappear if you close the tab.</p>
        </Card>
      );
    }

    function App() {
      // Lift current prompts so SlotMachine and Journal stay in sync.
      const [prompts, setPrompts] = useState(() => {
        const raw = localStorage.getItem(STORAGE.journal + todayKey());
        if (!raw) return null;
        try {
          const obj = JSON.parse(raw);
          return (Array.isArray(obj.prompts) && obj.prompts.length === 2) ? obj.prompts : null;
        } catch (e) { return null; }
      });

      return (
        <div className="page">
          <div className="stack-tight">
            <Title color="app-teal" size="large">Island Journal</Title>
            <p className="tagline">Pull the lever. Reflect. Write what comes up.</p>
          </div>

          <SlotMachine onPulled={setPrompts} initialPrompts={prompts} />

          <Journal prompts={prompts} />

          <p className="footer-note">Made on a little island · everything lives in your browser 🍃</p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
