  <style>
    /* Load custom font */
    @font-face {
      font-family: 'Mydogfont';
      src: url('Mydogfont-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    :root {
      --paper: #fefdfb;
      --ink: #2a1d10;
      --ink-soft: #6b513a;
      --reflect: #7a5e10;
      --check: #155544;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      color: var(--ink);
      font-family: 'Schoolbell', cursive;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    /* =============== WATERCOLOR PAPER BACKGROUND =============== */
    body {
      background-color: var(--paper);
      background-image:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.35 0 0 0 0 0.25 0 0 0 0 0.12 0 0 0 0.12 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='1200'><filter id='m'><feTurbulence type='fractalNoise' baseFrequency='0.012' numOctaves='2' seed='9'/><feColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.32 0 0 0 0 0.2 0 0 0 0.08 0'/></filter><rect width='100%25' height='100%25' filter='url(%23m)'/></svg>"),
        radial-gradient(ellipse at 50% 0%, #fffaf0 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, #f0e6d2 0%, transparent 65%);
      background-size: 320px 320px, 1200px 1200px, auto, auto;
      background-blend-mode: multiply, multiply, normal, multiply;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 20px 60px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 16px;
    }

    /* =============== CABINET =============== */
    .cabinet {
      position: relative;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      container-type: inline-size;
    }
    .cabinet-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
    }
    .cabinet-img.is-hidden { visibility: hidden; }
    .cabinet-img-dynamic { z-index: 2; }

    /* Reel text overlays — sit inside the cylinder's two screens.
       Font + padding scale with the cabinet (cqi = % of container width),
       so the whole composition shrinks together on mobile. No line-clamp /
       no overflow:hidden — long questions render in full. */
    .reel-text {
      position: absolute;
      z-index: 1;
      display: grid;
      place-items: center;
      padding: clamp(2px, 1.2cqi, 8px);
      text-align: center;
      font-family: 'Schoolbell', cursive;
      font-size: clamp(10.5px, 2.4cqi, 17px);
      font-weight: 600;
      line-height: 1.35;
      color: #1f1206;
      pointer-events: none;
      word-break: break-word;
    }
    /* Tuned to match user's red-box annotations — screens positioned
       lower in the visible area of the cylinder. */
    .reel-text-left  { left: 16%; width: 24%; top: 40%; height: 32%; }
    .reel-text-right { left: 42%; width: 24%; top: 40%; height: 32%; }
    .reel-text.spinning { animation: reel-shake 0.09s linear infinite; }
    @keyframes reel-shake {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    /* Invisible click area over the lever */
    .crank-hit {
      position: absolute;
      left: 60%;
      top: 0%;
      width: 35%;
      height: 45%;
      background: transparent !important;
      border: none;
      padding: 0;
      cursor: grab;
      z-index: 3;
      touch-action: none;   /* let us track a downward drag instead of scrolling */
      -webkit-tap-highlight-color: transparent;
    }
    .crank-hit:active { cursor: grabbing; }
    .crank-hit:hover, .crank-hit:active, .crank-hit:focus {
      background: transparent !important;
      outline: none;
    }
    .crank-hit:disabled { cursor: wait; }

    /* =============== DATE DISPLAY =============== */
    .cabinet-date {
      text-align: center;
      font-family: 'Mydogfont', cursive;
      font-size: clamp(24px, 5cqi, 40px);
      font-weight: 400;
      color: var(--ink);
      margin-bottom: -28px;
      margin-top: 4px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .cabinet-date::before {
      content: '';
      width: 7px;
      height: 7px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' preserveAspectRatio='xMidYMid meet'><defs><filter id='roughdot' filterUnits='objectBoundingBox'><feTurbulence type='fractalNoise' baseFrequency='0.4' numOctaves='5' result='noise'/><feDisplacementMap in='SourceGraphic' in2='noise' scale='2.5' xChannelSelector='R' yChannelSelector='G'/></filter></defs><circle cx='12' cy='12' r='8' fill='%232a1d10' filter='url(%23roughdot)'/></svg>");
      background-size: contain;
      background-repeat: no-repeat;
      flex-shrink: 0;
    }
    .cabinet-date::after {
      content: '';
      width: 7px;
      height: 7px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' preserveAspectRatio='xMidYMid meet'><defs><filter id='roughdot2' filterUnits='objectBoundingBox'><feTurbulence type='fractalNoise' baseFrequency='0.4' numOctaves='5' result='noise'/><feDisplacementMap in='SourceGraphic' in2='noise' scale='2.5' xChannelSelector='R' yChannelSelector='G'/></filter></defs><circle cx='12' cy='12' r='8' fill='%232a1d10' filter='url(%23roughdot2)'/></svg>");
      background-size: contain;
      background-repeat: no-repeat;
      flex-shrink: 0;
    }

    /* =============== REEL LABELS UNDER MACHINE =============== */
    .reel-labels {
      display: flex;
      justify-content: center;
      gap: clamp(50px, 14vw, 130px);
      align-items: baseline;
      margin-top: -16px;
      margin-bottom: 12px;
      font-family: 'Caveat', cursive;
      font-size: 30px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .reel-label-left  { color: var(--reflect); transform: rotate(-2deg); }
    .reel-label-right { color: var(--check);   transform: rotate(2deg); }

    /* =============== ANSWER AREA — handwritten ruled paper =============== */
    .answers {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .answer-block { display: flex; flex-direction: column; gap: 6px; }
    .answer-prompt {
      font-family: 'Schoolbell', cursive;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      padding: 4px 0 8px;
      letter-spacing: 0.01em;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      line-height: 1.5;
    }
    .answer-num {
      flex-shrink: 0;
      font-family: 'Mydogfont', cursive;
      font-size: 28px;
      font-weight: 400;
      line-height: 1;
      color: var(--ink-soft);
      margin-top: -2px;
    }
    .answer-block:nth-child(1) .answer-num,
    .answer-block:nth-child(2) .answer-num {
      color: #d9534f;
    }

    .answer-pad {
      position: relative;
      padding: calc(3% + 5px) calc(10% + 15px);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 200' preserveAspectRatio='none'><defs><filter id='wc' x='-30%25' y='-30%25' width='160%25' height='160%25'><feTurbulence type='fractalNoise' baseFrequency='0.018' numOctaves='3' seed='5' result='n'/><feDisplacementMap in='SourceGraphic' in2='n' scale='48' xChannelSelector='R' yChannelSelector='G'/><feGaussianBlur stdDeviation='9'/></filter><radialGradient id='g' cx='50%25' cy='50%25' r='62%25'><stop offset='0%25' stop-color='%23ecd9b0' stop-opacity='0.4'/><stop offset='55%25' stop-color='%23ecd9b0' stop-opacity='0.16'/><stop offset='100%25' stop-color='%23ecd9b0' stop-opacity='0'/></radialGradient></defs><ellipse cx='200' cy='100' rx='172' ry='86' fill='url(%23g)' filter='url(%23wc)'/></svg>");
      background-repeat: no-repeat;
      background-size: 100% 100%;
      background-position: center;
    }
    .answer-pad::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 36' preserveAspectRatio='none'><defs><filter id='sketch'><feTurbulence type='fractalNoise' baseFrequency='0.08' numOctaves='2' result='noise' seed='3'/><feDisplacementMap in='SourceGraphic' in2='noise' scale='1.5' xChannelSelector='R' yChannelSelector='G'/></filter></defs><line x1='0' y1='30' x2='1000' y2='30' stroke='%23bfbfbf' stroke-width='1.5' filter='url(%23sketch)'/></svg>");
      background-repeat: repeat-y;
      background-size: 100% 36px;
      background-position: 0 0;
      background-attachment: scroll;
      pointer-events: none;
    }
    .answer-input {
      position: relative;
      width: 100%;
      height: 72px;
      min-height: 72px;
      padding: 0;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Schoolbell', cursive;
      font-size: 18px;
      font-weight: 400;
      line-height: 36px;
      color: #2a1d10;
      letter-spacing: 0.5px;
      overflow: hidden;
      box-sizing: border-box;
    }
    .answer-input::placeholder {
      font-family: 'Mydogfont', cursive;
      color: rgba(42, 29, 16, 0.3);
    }
    .answer-input::-webkit-scrollbar { display: none; }
    .answer-input { -ms-overflow-style: none; scrollbar-width: none; }
    .answer-input::placeholder {
      color: rgba(107, 81, 58, 0.5);
      font-style: italic;
    }

    /* =============== SAVE BUTTON + METHOD ICONS =============== */
    .actions {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: -40px;
      padding-bottom: 60px;
    }
    .save-btn {
      position: relative;
      width: 200px;
      height: 200px;
      padding: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      box-shadow: none;
      transition: transform 0.08s ease;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }
    .save-btn img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .save-btn:hover { transform: scale(1.05); }
    .save-btn:active { transform: scale(0.95); }

    /* Row of 5 save-method icons that pops up above the save button */
    /* Float the icon row above the save button WITHOUT taking layout space,
       so the save button never gets pushed down. Negative margin pulls the
       row close to the save image. */
    .save-icons {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      margin-bottom: -34px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: clamp(8px, 3vw, 22px);
      z-index: 5;            /* float above the save button in the overlap */
      pointer-events: none;  /* only the icons themselves are clickable; gaps pass through */
    }
    .save-icons[hidden] { display: none; }
    .save-icons.is-open { animation: icons-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes icons-pop {
      from { opacity: 0; transform: translateY(18px) scale(0.82); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .save-icon {
      width: clamp(48px, 14vw, 66px);
      height: clamp(48px, 14vw, 66px);
      padding: 0;
      background: transparent;
      border: none;
      cursor: pointer;
      pointer-events: auto;  /* re-enable clicks on the icons themselves */
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      transition: transform 0.12s ease;
    }
    .save-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      -webkit-user-drag: none;
    }
    .save-icon:hover { transform: translateY(-4px) scale(1.08); }
    .save-icon:active { transform: scale(0.92); }

    /* tiny toast for not-yet-built save methods */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 42px;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: #fff;
      font-family: 'Schoolbell', cursive;
      font-size: 16px;
      letter-spacing: 0.5px;
      padding: 10px 22px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 50;
    }
    .toast.is-show { opacity: 0.95; transform: translateX(-50%) translateY(0); }

    .empty-state {
      text-align: center;
      font-family: 'Mydogfont', cursive;
      font-size: 26px;
      color: var(--ink);
      padding: 36px 20px;
      opacity: 1;
    }
    .empty-state[hidden] { display: none; }
  </style>
</head>
<body>
  <main class="page">
    <!-- DATE ABOVE CABINET -->
    <div class="cabinet-date" id="cabDate"></div>

    <!-- CABINET -->
    <div class="cabinet" id="cabinet">
      <img
        class="cabinet-img cabinet-img-static"
        id="staticImg"
        src="slot-machine-original-static.png"
        alt="slot machine"
        draggable="false"
      />
      <!-- dynamic .cabinet-img-dynamic is created/removed by JS each click -->

      <div class="reel-text reel-text-left"  id="reel1"></div>
      <div class="reel-text reel-text-right" id="reel2"></div>

      <button class="crank-hit" id="crankBtn" aria-label="拉摇杆"></button>
    </div>

    <!-- Labels below the machine removed per user request -->

    <!-- Answer area + Save -->
    <div class="answers" id="answersArea"></div>
    <div class="empty-state" id="emptyState" hidden>pull the lever to begin</div>
  </main>

  <script>
    /* ================= Question pools ================= */
    const DEEP_QUESTIONS = [
      "If your life were a book, what would the title of this current chapter be?",

      "If you knew you couldn't fail, what would you start tomorrow?",
      "What is something you believe deeply that you can't prove?",
      "What does 'home' mean to you right now, beyond a physical place?",

      "What would you do with a completely free, unstructured month?",
      "Whose life are you secretly comparing yours to, and why?",

      "What emotion have you been avoiding lately, and what is it trying to tell you?",
      "When did you last cry, and what was it really about?",
      "What's the difference between how you felt today and how you said you felt?",
      "Where in your body do you feel stress most often? What does it feel like?",
      "What's something that made you smile this week that surprised you?",
      "What feeling are you most uncomfortable letting other people see?",
      "When was the last time you felt completely at peace? What conditions made that possible?",
      "What does loneliness feel like for you, specifically?",
      "If your current mood had a color and a sound, what would they be?",
      "What is one feeling you wish you could feel more often?",
      "What's a compliment you received that you didn't quite believe?",
      "What angers you that probably shouldn't, and what's underneath the anger?",
      "What does anxiety try to protect you from?",
      "When do you feel most like yourself?",
      "What's an emotion you're grateful you've gotten better at handling?",
      "Who in your life have you been taking for granted?",
      "What would you say to someone you've lost, if you could send one message?",
      "Who is someone you think about often but rarely contact? Why?",
      "What kind of friend are you, and what kind of friend do you want to be?",
      "What's a relationship pattern you've noticed in your own life?",
      "When did someone last truly listen to you? How did it feel?",
      "What's something you've never told anyone, and why?",
      "Who has shaped your idea of love, for better or worse?",
      "What do you need from the people closest to you that you haven't asked for?",
      "What's a kindness you've received that you've never been able to repay?",
      "Who do you become around your family that you aren't elsewhere?",

      "What's one thing you've never thanked your past self for?",
      "If you could have one superpower, what would it be — and what would you actually use it for in your daily life?",

      "What's a question you've been afraid to ask?",
      "If your dreams were trying to send you a message, what do you think it would be?",
      "What's something 'weird' you secretly love?",
      "If you could time-travel for one day with no ability to change anything, where would you go?",
      "What's a future you imagine for yourself that you've never said out loud?",
      "If you could invent a holiday, what would it celebrate and how?",
      "What's a wild idea you've had recently that you dismissed too quickly?",
      "If you had to design a museum about your life, what would the first exhibit be?",
      "What invention do you wish existed?",
      "If you could send one object 1000 years into the future, what would it be?",
      "If your inner critic had a name and a face, what would they look like?",
      "What's an alternate life path you sometimes imagine?",
      "If you had to live in a single decade (past or future), which one and why?",
      "What's one small habit that has changed your life more than you expected?",
      "If your body could write you a letter today, what would it say?",
      "What's something you do daily that you rarely think about — and what would change if you paid attention to it?",
      "What's a 'small luxury' in your life that you'd defend fiercely?",
      "What does rest actually look like for you — not what you tell yourself it should look like?",
      "What part of your morning routine sets the tone for the rest of your day?",
      "What's a way you're kind to yourself that you wish you'd discovered sooner?",
      "What's something you used to love doing that you've stopped — for no clear reason?",
      "If you tracked your screen time honestly, what would surprise you?",
      "When was the last time you were bored, and what did boredom give you?",
      "What's the relationship between you and sleep right now?",
      "What food gives you a feeling of being cared for?",
      "What's a tiny ritual that brings you joy?",
      "If today had a soundtrack, what's the first song on it?",
      "What's the most beautiful thing you noticed this week?",
      "What's a fear you've outgrown, and how did that happen?",
      "What's a fear you'd like to outgrow?",
      "What's something you're proud of that took a long time?",
      "When did you last surprise yourself?",
      "What feedback have you received that stung, but turned out to be true?",
      "What's something you've quit that you're now proud of quitting?",
      "What's a 'failure' that, looking back, you wouldn't undo?",
      "What do you want to be different about your life one year from now?",
      "What's something you keep starting and never finishing? Why?",
      "What would you attempt if you knew it was okay to be bad at it?",
      "Where in your life are you brave without realizing it?",
      "What's a risk that didn't work out, but taught you something?",
      "What's an old story you tell about yourself that may no longer be true?",
      "What does 'enough' mean to you, in a world that always asks for more?",
      "What's something you used to believe was a flaw that you now see differently?",
      "If money truly weren't a factor, how would you spend your weekdays?",
      "What kind of work makes time disappear for you?",
      "What part of your work do you find quietly meaningful?",
      "What's something you're good at that you don't take credit for?",
      "What does 'ambition' mean to you right now — has its meaning shifted?",
      "Who do you secretly want to be seen by, in your work?",
      "What would 'enough' professional success look like for you?",
      "What's a project you'd start if no one would judge it?",
      "Where do you feel most useful?",
      "If you had to write your own job description, what would it actually say?",
      "What's a memory that feels like it belongs to a different version of you?",
      "What's a smell that always takes you somewhere else?",
      "What's something you remember vividly that no one else would?",
      "What object in your home holds the most story?",
      "What's a song that, when you hear it, you become a younger version of yourself?",
      "Whose voice plays in your head most often?",
      "What's something your culture taught you that you've kept, and what have you released?",
      "What part of your identity feels chosen, and what part feels inherited?",
      "What's a place you've only visited once that you still think about?",
      "What's a small moment of beauty you've never told anyone about?",
      "What's something ordinary you'd miss terribly if it were gone?",
      "Who made your life easier today, even slightly?",
      "What part of your body have you been ungrateful for?",
      "What's a way the world has surprised you lately, in a good way?",
      "What did you almost not do today, but did anyway?",
      "What's a privilege in your life you've stopped noticing?",
      "What's something you've gotten better at without trying?",
      "What part of today would you save in a tiny glass jar?",
      "What's a recent moment you wish you'd been more present for?",
      "What's something you used to want desperately that you now have?",

      "If you wrote a thank-you note today, who would it be to and what would it say?",
      "What's been quietly going right in your life that you haven't acknowledged?",
    ];

    const SIMPLE_QUESTIONS = [
      "How do you feel today? Name one word.",
      "What was the happiest moment today, even a tiny one?",
      "What did you eat that you actually enjoyed today?",
      "What's the weather doing where you are?",
      "What's the first thing you noticed when you woke up?",
      "Who did you talk to today?",
      "What made you laugh recently?",
      "What's one small thing that went well today?",
      "What are you looking forward to this week?",
      "Did you go outside today? How was it?",
      "What's something you're wearing today that you like?",
      "What's a sound you noticed today?",
      "What's a color you saw a lot of today?",
      "What did you drink today? Was it good?",
      "Are you tired right now? On a scale of 1–10?",
      "What's the last song you listened to?",
      "What's been on your mind in the background today?",
      "What's one thing you finished today, big or small?",
      "What did your body need today that you gave it (or didn't)?",
      "Who texted or called you today?",
      "What's the last thing that made you smile?",
      "What's one thing you saw outside today?",
      "What's something kind you did today (for yourself or someone else)?",
      "What's been frustrating today?",
      "What time did you wake up? How did you feel about it?",
      "What's one thing you're grateful for right now?",
      "What's the messiest spot in your space today?",
      "Did you move your body today? How?",
      "What's a smell you noticed today?",
      "What's a tiny win from today?",
      "What's something you wish you'd done differently today?",
      "What's a phrase you said (or heard) a lot today?",
      "What did you scroll past that stuck with you?",
      "How is your energy right now? Like a battery percentage.",
      "What's one thing you're putting off?",
      "What's a small comfort you're enjoying right now?",
      "Did you learn anything new today, even something tiny?",
      "What's the most beautiful thing you saw today?",
      "Who made today easier for you?",
      "What's something you want to remember about today?",
      "What's something you'd like to leave behind today?",
      "What did you say 'yes' to today? What did you say 'no' to?",
      "If today were a flavor, what would it taste like?",
      "What's the temperature of your mood right now?",
      "What's one thing you want to do before bed?",
      "What does the inside of your head sound like right now?",
      "What's a tiny pleasure you've had today?",
      "What's the last photo you took? Why did you take it?",
      "What's been the easiest part of today?",
      "What's been the hardest part of today?",
      "What time is it where you are, and how do you feel about it?",
      "What did your morning look like today?",
      "What does the rest of today look like for you?",
      "What's a sentence you'd write on a postcard about today?",
      "If your day were weather, what would the forecast say?",
      "What's a thought that keeps looping today?",
      "How does your space feel today — cozy, cluttered, calm, chaotic?",
      "What's something you noticed about a stranger today?",
      "Did you laugh out loud today? At what?",
      "What's the best thing you ate this week?",
      "What's a small habit you actually did today?",
      "What's something you'd like more of tomorrow?",
    ];

    /* ================= helpers ================= */
    const STORAGE_KEY = 'island-journal-';
    const pickOne = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const todayKey = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };
    const escapeHtml = (s) => s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    let audioCtx;
    const initAudio = async () => {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
          await audioCtx.resume();
        }
        return audioCtx;
      } catch (e) {
        console.error('Audio init failed:', e);
      }
    };
    const tone = (freq=600, dur=0.12, vol=0.05, type='sine') => {
      try {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
      } catch (e) {}
    };
    // Short filtered-noise burst — the basis of a percussive "click/tap".
    const noiseBurst = (dur = 0.03, vol = 0.14, freq = 2500, q = 1.1) => {
      try {
        initAudio();
        if (!audioCtx) return;
        const n = Math.max(1, Math.floor(audioCtx.sampleRate * dur));
        const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
        const ch = buf.getChannelData(0);
        for (let i = 0; i < n; i++) ch[i] = Math.random() * 2 - 1;
        const src = audioCtx.createBufferSource(); src.buffer = buf;
        const filt = audioCtx.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = freq; filt.Q.value = q;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        src.connect(filt).connect(g).connect(audioCtx.destination);
        src.start(); src.stop(audioCtx.currentTime + dur);
      } catch (e) {}
    };
    // 狗爪踏地的"哒"—— 清脆的指甲 click（噪声）+ 软软的肉垫底音
    const pawTap = () => {
      noiseBurst(0.028, 0.14, 2300 + Math.random() * 700, 1.1);  // claw tick on the floor
      tone(80 + Math.random() * 20, 0.045, 0.025, 'sine');       // soft paw-pad thump underneath
    };
    const tick = () => {};   // reel changes are SILENT — the dog-walk sound runs on its own clock
    const jingle = () => [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => tone(f, 0.18, 0.05, 'sine'), i*90));

    // Irregular paw-steps — a real dog doesn't walk on a metronome. We drive the
    // taps on a random-interval clock (not the reel cadence), with occasional quick
    // double-steps, so the rhythm feels natural instead of regularly slowing down.
    let walkTimer = null;
    const stopWalking = () => { if (walkTimer) { clearTimeout(walkTimer); walkTimer = null; } };
    const startWalking = (durationMs) => {
      stopWalking();
      const end = performance.now() + durationMs;
      const step = () => {
        if (performance.now() >= end) { walkTimer = null; return; }
        pawTap();
        if (Math.random() < 0.3) setTimeout(pawTap, 45 + Math.random() * 45);  // sometimes a 2nd paw right after
        walkTimer = setTimeout(step, 95 + Math.random() * 200);                 // uneven gaps
      };
      step();
    };
    /* ===== Real recording: play a RANDOM ~2.4s slice of dogwalk.mp3 each pull ===== */
    let dogWalkArrayBuffer = null;   // raw bytes, fetched once
    let dogWalkBuffer = null;        // decoded AudioBuffer
    fetch('dogwalk.mp3').then(r => r.ok ? r.arrayBuffer() : null).then(b => { dogWalkArrayBuffer = b; }).catch(() => {});

    const ensureDogBuffer = () => {
      if (dogWalkBuffer || !dogWalkArrayBuffer || !audioCtx) return;
      // decodeAudioData detaches the buffer, so decode a copy
      audioCtx.decodeAudioData(dogWalkArrayBuffer.slice(0)).then(buf => { dogWalkBuffer = buf; }).catch(() => {});
    };

    const playDogWalk = (segLen = 2.4) => {
      ensureDogBuffer();
      if (!dogWalkBuffer || !audioCtx) { startWalking(2400); return; }  // fallback until decoded
      const dur = dogWalkBuffer.duration;
      const len = Math.min(segLen, dur);
      const offset = Math.random() * Math.max(0, dur - len);   // random start point each time
      const src = audioCtx.createBufferSource(); src.buffer = dogWalkBuffer;
      const g = audioCtx.createGain();
      const t = audioCtx.currentTime, vol = 0.9;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol, t + 0.04);            // fade in
      g.gain.setValueAtTime(vol, t + len - 0.15);
      g.gain.exponentialRampToValueAtTime(0.0001, t + len);         // fade out
      src.connect(g).connect(audioCtx.destination);
      src.start(t, offset, len);
    };
    const leverSound = () => playDogWalk(2.4);

    /* ================= DOM refs ================= */
    const cabinetEl   = document.getElementById('cabinet');
    const staticImg   = document.getElementById('staticImg');
    const reel1El     = document.getElementById('reel1');
    const reel2El     = document.getElementById('reel2');
    const crankBtn    = document.getElementById('crankBtn');
    const answersArea = document.getElementById('answersArea');
    const emptyState  = document.getElementById('emptyState');
    const cabDateEl   = document.getElementById('cabDate');

    // Mydogfont has no glyph for the digit 0, so swap 0 → lowercase 'o' anywhere
    // it's rendered in that font (the date). Plain-text export keeps real digits.
    const zeroToO = (s) => s.replace(/0/g, 'o');
    let dateLabel = '';  // real-digit date (e.g., "June 30") for txt export

    // Set date above cabinet (e.g., "July 17")
    (() => {
      const d = new Date();
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      dateLabel = `${months[d.getMonth()]} ${d.getDate()}`;
      cabDateEl.textContent = zeroToO(dateLabel);  // on-page (Mydogfont) → o-swap
    })();

    /* ================= State ================= */
    const dayKey = todayKey();
    let prompts = null;            // [deepQ, simpleQ] | null
    let answers = ['', ''];
    let pulling = false;

    /* ===== Preload the APNG as a Blob so each click can spin a fresh
            ObjectURL — guarantees the browser decodes from frame 1 with NO
            network round-trip, no matter how many times the user clicks. ===== */
    let cachedDynamicBlob = null;
    fetch('slot-machine-original-dynamic.png')
      .then(r => r.ok ? r.blob() : null)
      .then(b => { cachedDynamicBlob = b; })
      .catch(() => {});

    /* Same blob-preload trick for the Save flow APNGs (before/after select) —
       CSS background-image does NOT replay APNG on iOS Safari, so we swap a
       fresh <img> ObjectURL each time. */
    let cachedBeforeBlob = null, cachedAfterBlob = null;
    fetch('before%20select.png').then(r => r.ok ? r.blob() : null).then(b => { cachedBeforeBlob = b; }).catch(() => {});
    fetch('after%20select.png').then(r => r.ok ? r.blob() : null).then(b => { cachedAfterBlob = b; }).catch(() => {});

    /* Preload image-export assets (divider + logo) as decoded Images. */
    const dividerImg = new Image(); dividerImg.src = 'divide%20line.png';
    const logoImg = new Image(); logoImg.src = 'logo.png';
    const imgReady = (img) => new Promise(res => {
      if (img.complete && img.naturalWidth) res();
      else { img.onload = () => res(); img.onerror = () => res(); }
    });

    /* ================= APNG replay logic =================
       The reliable way to restart an APNG: brand-new <img> element + a unique
       URL. We use an ObjectURL from the cached Blob (unique per call, zero
       network), with a cache-busted query-string fallback on cold-cache miss. */
    function mountFreshDynamic() {
      // remove any old dynamic img + revoke its url
      const old = cabinetEl.querySelector('.cabinet-img-dynamic');
      if (old) {
        if (old.dataset.objectUrl) URL.revokeObjectURL(old.dataset.objectUrl);
        old.remove();
      }

      const img = document.createElement('img');
      img.className = 'cabinet-img cabinet-img-dynamic';
      img.alt = 'lever animation';
      img.draggable = false;

      if (cachedDynamicBlob) {
        const u = URL.createObjectURL(cachedDynamicBlob);
        img.src = u;
        img.dataset.objectUrl = u;
      } else {
        img.src = 'slot-machine-original-dynamic.png?t=' + Date.now();
      }
      // insert before reel text so it sits in the right z layer
      cabinetEl.insertBefore(img, reel1El);
    }
    function removeDynamic() {
      const img = cabinetEl.querySelector('.cabinet-img-dynamic');
      if (!img) return;
      if (img.dataset.objectUrl) URL.revokeObjectURL(img.dataset.objectUrl);
      img.remove();
    }

    /* ================= Spin a single reel ================= */
    function spinReel(textEl, pool, finalText, durationMs) {
      textEl.classList.add('spinning');
      const id = setInterval(() => { textEl.textContent = pickOne(pool); tick(); }, 75);
      return new Promise(resolve => {
        setTimeout(() => {
          clearInterval(id);
          textEl.classList.remove('spinning');
          textEl.textContent = finalText;
          resolve();
        }, durationMs);
      });
    }

    /* ================= Pull handler ================= */
    async function handlePull() {
      if (pulling) return;
      pulling = true;
      try {
        // Initialize audio context early for mobile
        await initAudio();

        // 1) Hide static, mount a freshly-decoded APNG
        staticImg.classList.add('is-hidden');
        mountFreshDynamic();

        leverSound();

        // 2) Spin reels
        const deep   = pickOne(DEEP_QUESTIONS);
        const simple = pickOne(SIMPLE_QUESTIONS);
        await Promise.all([
          spinReel(reel1El, DEEP_QUESTIONS, deep, 1500),
          spinReel(reel2El, SIMPLE_QUESTIONS, simple, 2200),
        ]);

        // 3) Let the APNG settle, then swap back to static cylinder.
        setTimeout(() => {
          removeDynamic();
          staticImg.classList.remove('is-hidden');
        }, 350);

        jingle();

        prompts = [deep, simple];
        answers = ['', ''];        // every pull starts a fresh, empty answer area
        renderAnswers();
        saveEntry();
      } catch (e) {
        // never leave the lever stuck — restore the static frame on any failure
        removeDynamic();
        staticImg.classList.remove('is-hidden');
      } finally {
        pulling = false;
      }
    }
    /* ===== Pull gesture: press the lever, then drag DOWN to trigger ===== */
    const PULL_THRESHOLD = 20;   // px of downward drag needed to fire
    let pullStartY = null;
    let pullMaxY = null;         // furthest-down point seen during this touch
    let pullFired = false;

    // Fire if the drag went down far enough. Checked on every move AND on release,
    // because mobile browsers coalesce/drop move events on a fast flick — the final
    // (up) position is often the only reliable sample.
    function tryFirePull(clientY) {
      if (pullStartY === null || pullFired) return;
      if (clientY != null) pullMaxY = Math.max(pullMaxY ?? clientY, clientY);
      if ((pullMaxY - pullStartY) >= PULL_THRESHOLD) {
        pullFired = true;
        handlePull();
      }
    }

    crankBtn.addEventListener('pointerdown', (e) => {
      if (pulling) return;
      pullStartY = e.clientY;
      pullMaxY = e.clientY;
      pullFired = false;
      initAudio();                                  // unlock audio on the press (mobile)
      ensureDogBuffer();                            // start decoding the clip ASAP
      try { crankBtn.setPointerCapture(e.pointerId); } catch (_) {}
    });
    crankBtn.addEventListener('pointermove', (e) => tryFirePull(e.clientY));
    crankBtn.addEventListener('pointerup', (e) => {
      tryFirePull(e.clientY);                       // last chance — catches fast flicks
      pullStartY = null; pullMaxY = null;
      try { crankBtn.releasePointerCapture(e.pointerId); } catch (_) {}
    });
    crankBtn.addEventListener('pointercancel', () => { pullStartY = null; pullMaxY = null; });

    /* ================= Answer rendering / save ================= */
    let saveTimer;
    function debouncedSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveEntry, 400);
    }
    function saveEntry() {
      localStorage.setItem(STORAGE_KEY + dayKey, JSON.stringify({
        prompts, answers, savedAt: new Date().toISOString(),
      }));
    }

    function renderAnswers() {
      if (!prompts) {
        emptyState.hidden = false;
        answersArea.innerHTML = '';
        return;
      }
      emptyState.hidden = true;
      answersArea.innerHTML = prompts.map((p, i) => `
        <div class="answer-block">
          <div class="answer-prompt">
            <span class="answer-num">${i + 1}.</span>
            <span>${escapeHtml(p)}</span>
          </div>
          <div class="answer-pad">
            <textarea class="answer-input" data-idx="${i}" placeholder="..."></textarea>
          </div>
        </div>
      `).join('') + `
        <div class="actions">
          <div class="save-icons" id="saveIcons" hidden>
            <button class="save-icon" data-method="txt"    aria-label="Save as TXT"><img src="txt%20icon.png" draggable="false" /></button>
            <button class="save-icon" data-method="pic"    aria-label="Save as image"><img src="pic%20icon.png" draggable="false" /></button>
            <button class="save-icon" data-method="google" aria-label="Save to Google Doc"><img src="google%20doc%20icon.png" draggable="false" /></button>
            <button class="save-icon" data-method="notion" aria-label="Save to Notion"><img src="notion%20icon.png" draggable="false" /></button>
            <button class="save-icon" data-method="feishu" aria-label="Save to Feishu"><img src="feishu%20icon.png" draggable="false" /></button>
          </div>
          <button class="save-btn" id="saveBtn"><img id="saveImg" src="save-static.png" alt="Save" draggable="false" /></button>
        </div>
      `;
      // Hydrate textarea values + wire input listeners
      answersArea.querySelectorAll('textarea.answer-input').forEach(ta => {
        const idx = parseInt(ta.dataset.idx, 10);
        ta.value = answers[idx] || '';

        // Auto-expand height
        const autoExpand = (e) => {
          e.style.height = 'auto';
          e.style.height = Math.max(e.scrollHeight, 72) + 'px';
        };

        ta.addEventListener('input', () => {
          answers[idx] = ta.value;
          autoExpand(ta);
          debouncedSave();
        });

        // Initial height adjustment
        autoExpand(ta);
      });
      const saveBtnEl = document.getElementById('saveBtn');
      const saveIconsEl = document.getElementById('saveIcons');
      saveBtnEl.addEventListener('click', toggleSaveMenu);
      saveIconsEl.querySelectorAll('.save-icon').forEach(btn => {
        btn.addEventListener('click', () => chooseSaveMethod(btn.dataset.method));
      });
    }

    /* ================= Save flow ================= */
    let menuOpen = false;
    let saveAnimUrl = null;

    // Swap the save image to a freshly-decoded APNG (blob ObjectURL → plays
    // from frame 1, the only reliable way to replay APNG on iOS Safari).
    function playSaveApng(blob, fallbackName) {
      const saveImgEl = document.getElementById('saveImg');
      if (!saveImgEl) return;
      if (saveAnimUrl) { URL.revokeObjectURL(saveAnimUrl); saveAnimUrl = null; }
      if (blob) {
        saveAnimUrl = URL.createObjectURL(blob);
        saveImgEl.src = saveAnimUrl;
      } else {
        saveImgEl.src = fallbackName + '?t=' + Date.now();
      }
    }

    function toggleSaveMenu() {
      const saveIconsEl = document.getElementById('saveIcons');
      if (menuOpen) { closeSaveMenu(); return; }
      menuOpen = true;
      playSaveApng(cachedBeforeBlob, 'before%20select.png');  // before-select animation
      saveIconsEl.hidden = false;
      void saveIconsEl.offsetWidth;                            // reflow → replay pop
      saveIconsEl.classList.add('is-open');
    }

    function closeSaveMenu() {
      const saveIconsEl = document.getElementById('saveIcons');
      const saveImgEl = document.getElementById('saveImg');
      menuOpen = false;
      saveIconsEl.classList.remove('is-open');
      setTimeout(() => { if (!menuOpen) saveIconsEl.hidden = true; }, 220);
      if (saveImgEl) saveImgEl.src = 'save-static.png';
    }

    async function chooseSaveMethod(method) {
      const saveIconsEl = document.getElementById('saveIcons');
      menuOpen = false;
      saveIconsEl.classList.remove('is-open');
      setTimeout(() => { saveIconsEl.hidden = true; }, 200);

      // after-select animation
      playSaveApng(cachedAfterBlob, 'after%20select.png');

      // Yield to the browser so the after-select animation + tap feedback
      // actually paint BEFORE any heavy work (image canvas) blocks the main
      // thread. Without this, tapping the image icon looks unresponsive on
      // mobile because the canvas crunch freezes the UI before it can render.
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(() => setTimeout(r, 60))));

      try {
        if (method === 'txt')      saveAsTxt();
        else if (method === 'pic') await saveAsImage();
        else                       showToast('coming soon');  // google / notion / feishu — UI only
      } catch (e) {}

      // restore the static save image after the animation settles
      setTimeout(() => {
        const saveImgEl = document.getElementById('saveImg');
        if (saveAnimUrl) { URL.revokeObjectURL(saveAnimUrl); saveAnimUrl = null; }
        if (saveImgEl) saveImgEl.src = 'save-static.png';
      }, 2000);
    }

    /* ---- TXT export: date, questions, answers only (no Chinese / branding) ---- */
    function saveAsTxt() {
      let body = `${dateLabel}, ${new Date().getFullYear()}\n\n`;
      prompts.forEach((p, i) => {
        body += `${i + 1}. ${p}\n${answers[i] || ''}\n\n`;
      });
      const blob = new Blob([body], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `gacha-journal-${dayKey}.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    /* ---- Image export: canvas with date, Q+A, divider, logo ---- */
    function wrapLines(ctx, text, maxWidth) {
      const words = (text || '').split(/\s+/).filter(Boolean);
      if (!words.length) return [''];
      const lines = [];
      let line = '';
      for (const w of words) {
        const test = line ? line + ' ' + w : w;
        if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = w; }
        else line = test;
      }
      if (line) lines.push(line);
      return lines;
    }

    async function exportImageBlob() {
      try {
        await Promise.all([
          document.fonts.load('600 56px Mydogfont'),
          document.fonts.load('700 40px Schoolbell'),
          document.fonts.load('400 36px Schoolbell'),
        ]);
        await document.fonts.ready;
      } catch (e) {}
      await Promise.all([imgReady(dividerImg), imgReady(logoImg)]);

      const W = 1080, pad = 90, contentW = W - pad * 2;
      const INK = '#2a1d10', INK_SOFT = '#3a2a18', RED = '#d9534f';
      const c = document.createElement('canvas');
      const ctx = c.getContext('2d');

      // ---- layout pass ----
      const blocks = [];
      blocks.push({ kind: 'date', text: cabDateEl.textContent, font: '600 56px Mydogfont', lh: 70, after: 40 });
      prompts.forEach((p, i) => {
        const numText = (i + 1) + '.';
        const numFont = '400 46px Mydogfont';
        ctx.font = numFont;
        const numW = ctx.measureText(numText).width + 14;
        ctx.font = '700 40px Schoolbell';
        const qLines = wrapLines(ctx, p, contentW - numW);
        blocks.push({ kind: 'q', numText, numFont, numW, lines: qLines, font: '700 40px Schoolbell', lh: 56, after: 14 });
        ctx.font = '400 36px Schoolbell';
        const aInset = 44; // extra horizontal breathing room for answers
        const aLines = wrapLines(ctx, (answers[i] || '').trim(), contentW - aInset * 2);
        blocks.push({ kind: 'a', lines: aLines, inset: aInset, font: '400 36px Schoolbell', lh: 50, after: i === 0 ? 30 : 46 });
        if (i === 0) blocks.push({ kind: 'divider', before: 6, after: 36 });
      });
      blocks.push({ kind: 'logo', before: 36, after: 0 });

      let y = pad;
      for (const b of blocks) {
        if (b.before) y += b.before;
        if (b.kind === 'divider') { b.h = contentW * (dividerImg.naturalHeight / dividerImg.naturalWidth); y += b.h; }
        else if (b.kind === 'logo') { b.w = 380; b.h = b.w * (logoImg.naturalHeight / logoImg.naturalWidth); y += b.h; }
        else { y += (b.lines ? b.lines.length : 1) * b.lh; }
        if (b.after) y += b.after;
      }
      const H = y + pad;

      // ---- draw pass (retina) ----
      const scale = 2;
      c.width = W * scale; c.height = H * scale;
      ctx.scale(scale, scale);
      ctx.fillStyle = '#fefdfb';
      ctx.fillRect(0, 0, W, H);
      ctx.textBaseline = 'alphabetic';

      y = pad;
      for (const b of blocks) {
        if (b.before) y += b.before;
        if (b.kind === 'divider') {
          ctx.drawImage(dividerImg, pad, y, contentW, b.h); y += b.h;
        } else if (b.kind === 'logo') {
          ctx.drawImage(logoImg, (W - b.w) / 2, y, b.w, b.h); y += b.h;
        } else if (b.kind === 'date') {
          ctx.font = b.font; ctx.fillStyle = INK; ctx.textAlign = 'center';
          ctx.fillText(b.text, W / 2, y + b.lh * 0.75); y += b.lh;
        } else if (b.kind === 'q') {
          ctx.textAlign = 'left';
          b.lines.forEach((ln, idx) => {
            const yy = y + b.lh * 0.72 + idx * b.lh;
            if (idx === 0) { ctx.font = b.numFont; ctx.fillStyle = RED; ctx.fillText(b.numText, pad, yy); }
            ctx.font = b.font; ctx.fillStyle = INK; ctx.fillText(ln, pad + b.numW, yy);
          });
          y += b.lines.length * b.lh;
        } else { // answer
          ctx.textAlign = 'left'; ctx.font = b.font; ctx.fillStyle = INK_SOFT;
          const ax = pad + (b.inset || 0);
          b.lines.forEach((ln, idx) => ctx.fillText(ln, ax, y + b.lh * 0.72 + idx * b.lh));
          y += b.lines.length * b.lh;
        }
        if (b.after) y += b.after;
      }

      return new Promise(res => c.toBlob(b => res(b), 'image/png'));
    }

    async function saveAsImage() {
      const blob = await exportImageBlob();
      if (!blob) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `gacha-journal-${dayKey}.png`;
      a.click();
      URL.revokeObjectURL(url);
    }

    /* ---- tiny toast ---- */
    function showToast(msg) {
      let t = document.getElementById('toast');
      if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
      t.textContent = msg;
      void t.offsetWidth;
      t.classList.add('is-show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('is-show'), 1800);
    }

    /* ================= Init: load saved entry ================= */
    (function loadSaved() {
      const raw = localStorage.getItem(STORAGE_KEY + dayKey);
      if (!raw) { renderAnswers(); return; }
      try {
        const obj = JSON.parse(raw);
        if (Array.isArray(obj.prompts) && obj.prompts.length === 2) {
          prompts = obj.prompts;
          reel1El.textContent = obj.prompts[0];
          reel2El.textContent = obj.prompts[1];
        }
        if (Array.isArray(obj.answers)) {
          answers = obj.answers.slice(0, 2);
          while (answers.length < 2) answers.push('');
        }
      } catch (e) {}
      renderAnswers();
    })();
  </script>
