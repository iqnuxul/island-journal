<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reviews · Gacha Journal</title>
  <meta name="description" content="Leave a little note about Gacha Journal." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Schoolbell&family=Caveat:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    @font-face {
      font-family: 'Mydogfont';
      src: url('Mydogfont-Regular.ttf') format('truetype');
      font-weight: normal; font-style: normal;
    }
    :root {
      --paper: #fefdfb;
      --ink: #2a1d10;
      --ink-soft: #6b513a;
      --reflect: #7a5e10;
      --check: #155544;
      --red: #d9534f;
      --line: rgba(107, 81, 58, 0.35);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh;
      color: var(--ink);
      font-family: 'Schoolbell', cursive;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background-color: var(--paper);
      background-image:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.35 0 0 0 0 0.25 0 0 0 0 0.12 0 0 0 0.07 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      background-size: 320px 320px;
      background-blend-mode: multiply;
    }
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 36px 20px 80px;
    }

    /* ===== Header ===== */
    .head { text-align: center; margin-bottom: 8px; }
    .head h1 {
      font-family: 'Mydogfont', cursive;
      font-weight: 400;
      font-size: clamp(34px, 9vw, 54px);
      letter-spacing: 1px;
      line-height: 1.1;
    }
    .head p {
      font-family: 'Caveat', cursive;
      font-size: 22px;
      color: var(--ink-soft);
      margin-top: 2px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      font-family: 'Caveat', cursive;
      font-size: 20px;
      color: var(--ink-soft);
      text-decoration: none;
    }
    .back-link:hover { color: var(--ink); }

    /* ===== Form card ===== */
    .card {
      position: relative;
      background: #fff8e7;
      border: 2px solid var(--ink);
      border-radius: 14px;
      padding: 22px 22px 24px;
      margin: 26px 0 40px;
      box-shadow: 0 6px 0 0 rgba(42, 29, 16, 0.12);
    }
    .card h2 {
      font-family: 'Caveat', cursive;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 15px;
      color: var(--ink-soft);
      margin-bottom: 5px;
      letter-spacing: 0.3px;
    }
    input[type=email], input[type=text], textarea, input[type=tel] {
      width: 100%;
      font-family: 'Schoolbell', cursive;
      font-size: 18px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.6);
      border: 1.5px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
    }
    input:focus, textarea:focus { border-color: var(--ink); }
    textarea { resize: vertical; min-height: 90px; line-height: 1.5; }

    .btn {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 21px;
      letter-spacing: 0.5px;
      padding: 9px 26px;
      background: #fff8e7;
      color: var(--ink);
      border: 2px solid var(--ink);
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 4px 0 0 var(--ink);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 5px 0 0 var(--ink); }
    .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 0 var(--ink); }
    .btn:disabled { opacity: 0.5; cursor: wait; box-shadow: 0 2px 0 0 var(--ink); transform: none; }
    .btn.ghost { background: transparent; box-shadow: none; border-color: var(--line); color: var(--ink-soft); font-size: 18px; padding: 6px 16px; }
    .btn.ghost:hover { transform: none; border-color: var(--ink); color: var(--ink); }

    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .hint { font-size: 14px; color: var(--ink-soft); margin-top: 6px; line-height: 1.4; }
    .msg { font-size: 15px; margin-top: 10px; min-height: 18px; }
    .msg.err { color: var(--red); }
    .msg.ok  { color: var(--check); }

    /* avatar picker */
    .avatar-pick { display: flex; align-items: center; gap: 14px; }
    .avatar-preview {
      width: 64px; height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--ink);
      background: #efe6d2;
      flex-shrink: 0;
    }
    .avatar-preview.empty { display: flex; align-items: center; justify-content: center; font-size: 26px; color: var(--ink-soft); }
    input[type=file] { display: none; }

    .step { display: none; }
    .step.active { display: block; }

    /* ===== Reviews wall ===== */
    .wall-title {
      font-family: 'Caveat', cursive;
      font-size: 26px;
      font-weight: 700;
      color: var(--ink-soft);
      margin: 8px 0 16px;
      text-align: center;
    }
    .reviews { display: flex; flex-direction: column; gap: 18px; }
    .review {
      display: flex;
      gap: 14px;
      background: #fffdf6;
      border: 1.5px solid rgba(42, 29, 16, 0.18);
      border-radius: 14px;
      padding: 16px 16px 18px;
      box-shadow: 0 3px 0 0 rgba(42, 29, 16, 0.08);
    }
    .review:nth-child(odd) { transform: rotate(-0.4deg); }
    .review:nth-child(even) { transform: rotate(0.4deg); }
    .review-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--ink);
      background: #efe6d2;
      flex-shrink: 0;
    }
    .review-avatar.empty { display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--ink-soft); }
    .review-body { flex: 1; min-width: 0; }
    .review-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .review-name { font-family: 'Caveat', cursive; font-weight: 700; font-size: 22px; color: var(--ink); }
    .review-date { font-size: 13px; color: var(--ink-soft); flex-shrink: 0; }
    .review-text { font-size: 17px; line-height: 1.5; margin-top: 4px; word-break: break-word; white-space: pre-wrap; }
    .empty-wall { text-align: center; font-family: 'Caveat', cursive; font-size: 22px; color: var(--ink-soft); padding: 30px 10px; opacity: 0.8; }
  </style>
</head>
<body>
  <main class="page">
    <a class="back-link" href="/">← back to the journal</a>

    <div class="head">
      <h1>Reviews</h1>
      <p>leave a little note ✎</p>
    </div>

    <!-- ===== Leave a review ===== -->
    <section class="card" id="formCard">
      <h2>Leave your mark</h2>

      <!-- Step 1: email -->
      <div class="step active" id="stepEmail">
        <div class="field">
          <label for="email">Your email (we just verify it's really you)</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="row">
          <button class="btn" id="sendCodeBtn">Send code</button>
        </div>
        <div class="hint">We'll email you a 6-digit code. Your email is never shown publicly.</div>
        <div class="msg" id="emailMsg"></div>
      </div>

      <!-- Step 2: code -->
      <div class="step" id="stepCode">
        <div class="field">
          <label for="code">Enter the 6-digit code we emailed to <span id="codeEmailLabel"></span></label>
          <input type="tel" id="code" inputmode="numeric" maxlength="6" placeholder="123456" autocomplete="one-time-code" />
        </div>
        <div class="row">
          <button class="btn" id="verifyBtn">Verify</button>
          <button class="btn ghost" id="changeEmailBtn">change email</button>
        </div>
        <div class="msg" id="codeMsg"></div>
      </div>

      <!-- Step 3: profile + message -->
      <div class="step" id="stepProfile">
        <div class="field">
          <label>Profile picture</label>
          <div class="avatar-pick">
            <img class="avatar-preview empty" id="avatarPreview" alt="" />
            <span class="avatar-preview empty" id="avatarPlaceholder">☺</span>
            <button class="btn ghost" id="pickAvatarBtn" type="button">upload photo</button>
            <input type="file" id="avatarInput" accept="image/*" />
          </div>
        </div>
        <div class="field">
          <label for="nickname">Nickname</label>
          <input type="text" id="nickname" maxlength="40" placeholder="what should we call you?" />
        </div>
        <div class="field">
          <label for="message">Your review</label>
          <textarea id="message" maxlength="1000" placeholder="say something nice (or honest) ♡"></textarea>
        </div>
        <div class="row">
          <button class="btn" id="submitBtn">Post review</button>
        </div>
        <div class="msg" id="profileMsg"></div>
      </div>
    </section>

    <!-- ===== Wall ===== -->
    <div class="wall-title">what people are saying</div>
    <div class="reviews" id="reviews"></div>
    <div class="empty-wall" id="emptyWall" hidden>No reviews yet — be the first ✦</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    /* ================= CONFIG — fill these from your Supabase project =================
       Project Settings → API:
         SUPABASE_URL      = "https://xxxx.supabase.co"
         SUPABASE_ANON_KEY = "eyJhbGci..."   (anon / public key — safe to expose)            */
    const SUPABASE_URL = "https://eekigzhgqpwqnhkoolfv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVla2lnemhncXB3cW5oa29vbGZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NjIwMjcsImV4cCI6MjA5ODMzODAyN30.iYngPyBzaSFbCvOlNri0De3wdTrrkTuDzqDLUX3GZeQ";
    const CONFIGURED = !SUPABASE_URL.startsWith("__");

    const sb = CONFIGURED ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    /* ---- elements ---- */
    const $ = (id) => document.getElementById(id);
    const steps = { email: $('stepEmail'), code: $('stepCode'), profile: $('stepProfile') };
    function showStep(name) {
      Object.entries(steps).forEach(([k, el]) => el.classList.toggle('active', k === name));
    }
    function setMsg(el, text, kind) { el.textContent = text || ''; el.className = 'msg' + (kind ? ' ' + kind : ''); }

    let pendingEmail = '';
    let avatarFile = null;

    /* ================= Email → code → verify ================= */
    $('sendCodeBtn').addEventListener('click', async () => {
      const email = $('email').value.trim();
      if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { setMsg($('emailMsg'), 'Please enter a valid email.', 'err'); return; }
      if (!CONFIGURED) { setMsg($('emailMsg'), 'Backend not configured yet.', 'err'); return; }
      const btn = $('sendCodeBtn'); btn.disabled = true;
      setMsg($('emailMsg'), 'Sending…');
      const { error } = await sb.auth.signInWithOtp({ email, options: { shouldCreateUser: true } });
      btn.disabled = false;
      if (error) { setMsg($('emailMsg'), error.message, 'err'); return; }
      pendingEmail = email;
      $('codeEmailLabel').textContent = email;
      setMsg($('emailMsg'), '');
      showStep('code');
      $('code').focus();
    });

    $('changeEmailBtn').addEventListener('click', () => { showStep('email'); setMsg($('codeMsg'), ''); });

    $('verifyBtn').addEventListener('click', async () => {
      const token = $('code').value.trim();
      if (!/^\d{6}$/.test(token)) { setMsg($('codeMsg'), 'Enter the 6-digit code.', 'err'); return; }
      const btn = $('verifyBtn'); btn.disabled = true;
      setMsg($('codeMsg'), 'Verifying…');
      const { data, error } = await sb.auth.verifyOtp({ email: pendingEmail, token, type: 'email' });
      btn.disabled = false;
      if (error) { setMsg($('codeMsg'), error.message, 'err'); return; }
      setMsg($('codeMsg'), '');
      enterProfileStep();
    });

    /* ================= Profile + submit ================= */
    function enterProfileStep() {
      showStep('profile');
      $('nickname').focus();
    }

    $('pickAvatarBtn').addEventListener('click', () => $('avatarInput').click());
    $('avatarInput').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { setMsg($('profileMsg'), 'Image too large (max 5MB).', 'err'); return; }
      avatarFile = file;
      const url = URL.createObjectURL(file);
      const img = $('avatarPreview');
      img.src = url;
      img.classList.remove('empty');
      $('avatarPlaceholder').style.display = 'none';
      setMsg($('profileMsg'), '');
    });

    $('submitBtn').addEventListener('click', async () => {
      const nickname = $('nickname').value.trim();
      const message = $('message').value.trim();
      if (!nickname) { setMsg($('profileMsg'), 'Please add a nickname.', 'err'); return; }
      if (!message) { setMsg($('profileMsg'), 'Please write something.', 'err'); return; }
      const btn = $('submitBtn'); btn.disabled = true;
      setMsg($('profileMsg'), 'Posting…');

      try {
        const { data: { user } } = await sb.auth.getUser();
        if (!user) throw new Error('Session expired — please verify again.');

        let avatar_url = null;
        if (avatarFile) {
          const ext = (avatarFile.name.split('.').pop() || 'jpg').toLowerCase();
          const path = `${user.id}/${Date.now()}.${ext}`;
          const up = await sb.storage.from('avatars').upload(path, avatarFile, { upsert: true, contentType: avatarFile.type });
          if (up.error) throw up.error;
          avatar_url = sb.storage.from('avatars').getPublicUrl(path).data.publicUrl;
        }

        const ins = await sb.from('reviews').insert({ user_id: user.id, nickname, message, avatar_url }).select().single();
        if (ins.error) throw ins.error;

        setMsg($('profileMsg'), 'Thank you! ♡', 'ok');
        prependReview(ins.data);
        // reset form
        $('nickname').value = ''; $('message').value = '';
        avatarFile = null;
        $('avatarPreview').src = ''; $('avatarPreview').classList.add('empty');
        $('avatarPlaceholder').style.display = '';
      } catch (err) {
        setMsg($('profileMsg'), err.message || 'Something went wrong.', 'err');
      } finally {
        btn.disabled = false;
      }
    });

    /* ================= Render reviews ================= */
    const escapeHtml = (s) => (s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    function fmtDate(iso) {
      const d = new Date(iso);
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    }
    function reviewHTML(r) {
      const avatar = r.avatar_url
        ? `<img class="review-avatar" src="${escapeHtml(r.avatar_url)}" alt="" />`
        : `<div class="review-avatar empty">☺</div>`;
      return `
        <div class="review">
          ${avatar}
          <div class="review-body">
            <div class="review-top">
              <span class="review-name">${escapeHtml(r.nickname)}</span>
              <span class="review-date">${fmtDate(r.created_at)}</span>
            </div>
            <div class="review-text">${escapeHtml(r.message)}</div>
          </div>
        </div>`;
    }
    function prependReview(r) {
      $('emptyWall').hidden = true;
      $('reviews').insertAdjacentHTML('afterbegin', reviewHTML(r));
    }
    async function loadReviews() {
      if (!CONFIGURED) { $('emptyWall').hidden = false; $('emptyWall').textContent = 'Backend not configured yet.'; return; }
      const { data, error } = await sb.from('reviews').select('*').order('created_at', { ascending: false }).limit(200);
      if (error) { $('emptyWall').hidden = false; $('emptyWall').textContent = 'Could not load reviews.'; return; }
      if (!data || !data.length) { $('emptyWall').hidden = false; return; }
      $('reviews').innerHTML = data.map(reviewHTML).join('');
    }

    /* ================= Init ================= */
    (async function init() {
      loadReviews();
      // If already signed in (returning verified user), skip straight to the profile step.
      if (CONFIGURED) {
        const { data: { session } } = await sb.auth.getSession();
        if (session && session.user) enterProfileStep();
      }
    })();
  </script>
</body>
</html>
